<title>ピンポン野球 速報</title>
<style>
  body{margin:0;background:#0d0d10;color:#9fa3ad;font-family:sans-serif;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
</style>
</head>
<body>
読み込み中…
<script>
// ピンポン野球速報サイトのラッパーページ。
// GASのWebアプリからページ内容をCookie無しで取得して表示する
// （script.google.com を直接開くと起きるGoogleの多重ログイン問題を回避できる）。
// デプロイを作り直してURLが変わったときは、下のGAS_URLを新しい /exec に差し替えること。
var GAS_URL = "https://script.google.com/macros/s/AKfycbzGOx89-rBxlZaPo2S1UDKbURy_4X9ZLGf-stYZ4Wh1G6sw07OudAfKUoGC6kAC1fGQKg/exec";

fetch(GAS_URL + (location.search ? location.search + "&raw=1" : "?raw=1"))
  .then(function (r) { return r.text(); })
  .then(function (t) {
    document.open();
    document.write(t);
    document.close();
  })
  .catch(function () {
    document.body.textContent = "読み込みに失敗しました。通信環境を確認して再読み込みしてください。";
  });
</script>
</body>
</html>
